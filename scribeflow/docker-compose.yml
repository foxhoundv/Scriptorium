version: '3.8'

# ── ScribeFlow Docker Compose ─────────────────────────────────────────────
#
# SERVICES:
#   scribeflow     — the main app (always running)
#   bible-fetcher  — one-shot Bible downloader (run manually after build)
#
# QUICK START:
#   docker compose up -d                      # start ScribeFlow
#   docker compose run --rm bible-fetcher     # fetch Bible data (once)
#
# The fetcher downloads ~25 MB of public-domain translations into a
# persistent volume (bible_data). ScribeFlow reads from that same volume
# so Bible data survives image rebuilds without re-fetching.
# The fetcher is safe to re-run — present translations are skipped.
#
# UPDATE WORKFLOW:
#   docker compose down
#   docker compose build --no-cache
#   docker compose up -d
#   # Bible data already in bible_data volume — no need to re-fetch.
#
# FORCE RE-FETCH (e.g. to add a translation):
#   docker volume rm scribeflow_bible_data
#   docker compose run --rm bible-fetcher
#
# BACKUP projects:
#   docker run --rm \
#     -v scribeflow_scribeflow_data:/data \
#     -v $(pwd):/backup \
#     alpine tar -czf /backup/scribeflow-backup-$(date +%Y%m%d).tar.gz /data
# ─────────────────────────────────────────────────────────────────────────

services:

  # ── Main application ──────────────────────────────────────────────────
  scribeflow:
    build: .
    container_name: scribeflow
    restart: unless-stopped
    ports:
      - "${PORT:-3051}:3051"
    volumes:
      - scribeflow_data:/data
      - bible_data:/app/data/bibles   # reads Bible JSON written by fetcher
    environment:
      - PORT=3051
      - DATA_DIR=/data
      - NODE_ENV=production
      # ── Google SSO (optional — leave commented out for single-user mode) ──
      # AUTH_ENABLED=true
      # GOOGLE_CLIENT_ID=your-client-id.apps.googleusercontent.com
      # GOOGLE_CLIENT_SECRET=your-client-secret
      # GOOGLE_CALLBACK_URL=https://your-domain.com/auth/google/callback
      # SESSION_SECRET=change-this-to-a-long-random-string
      # TRUST_PROXY=true  # set if behind a reverse proxy (Nginx, Traefik, etc.)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3051/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Bible data fetcher ────────────────────────────────────────────────
  # Run once after first build:  docker compose run --rm bible-fetcher
  # Uses the same image — no extra build step.
  # Writes JSON files into bible_data volume, which scribeflow also mounts.
  bible-fetcher:
    build: .
    container_name: scribeflow-bible-fetcher
    profiles:
      - tools
    volumes:
      - bible_data:/app/data/bibles   # writes here; scribeflow reads here
    environment:
      - NODE_ENV=production
    command: ["node", "scripts/fetch-bibles.js"]
    restart: "no"

volumes:
  scribeflow_data:
    driver: local
    # Uncomment to bind to a host path (NAS / ZFS dataset):
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/your-nas/scribeflow-data

  bible_data:
    driver: local
    # Holds the Bible JSON files (~25 MB).
    # Shared between scribeflow (read) and bible-fetcher (write).
    # Persists across image rebuilds — only removed with:
    #   docker compose down -v   or   docker volume rm scribeflow_bible_data
