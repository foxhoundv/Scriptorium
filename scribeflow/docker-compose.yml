version: '3.8'

# ── ScribeFlow Docker Compose ─────────────────────────────────────────────
#
# SERVICES:
#   scribeflow     — the main app (always running)
#   bible-fetcher  — one-shot Bible downloader (run manually after build)
#
# QUICK START (single-user, no login):
#   docker compose up -d                      # start ScribeFlow
#   docker compose run --rm bible-fetcher     # fetch Bible data (once)
#
# ENABLE MULTI-USER MODE:
#   Uncomment the AUTH_ENABLED, ADMIN_USERNAME, ADMIN_PASSWORD, and
#   SESSION_SECRET lines below, then rebuild and restart:
#     docker compose down
#     docker compose build --no-cache
#     docker compose up -d
#
#   On first start ScribeFlow creates the admin account automatically.
#   Log in with ADMIN_USERNAME / ADMIN_PASSWORD and change the password
#   immediately via the App Settings → Users panel.
#
# UPDATE WORKFLOW:
#   docker compose down
#   docker compose build --no-cache
#   docker compose up -d
#   # Existing database and Bible data are preserved in named volumes.
#
# BACKUP:
#   docker run --rm \
#     -v scribeflow_scribeflow_data:/data \
#     -v $(pwd):/backup \
#     alpine tar -czf /backup/scribeflow-backup-$(date +%Y%m%d).tar.gz /data
# ─────────────────────────────────────────────────────────────────────────

services:

  # ── Main application ──────────────────────────────────────────────────
  scribeflow:
    build: .
    container_name: scribeflow
    restart: unless-stopped
    ports:
      - "${PORT:-3051}:3051"
    volumes:
      - scribeflow_data:/data
      - bible_data:/app/data/bibles
    environment:
      - PORT=3051
      - DATA_DIR=/data
      - NODE_ENV=production
      # ── Multi-user mode (comment out for single-user / no login) ──────
      # - AUTH_ENABLED=true
      # - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=change-this-password
      # - SESSION_SECRET=change-this-to-a-long-random-string
      # - COOKIE_SECURE=true   # uncomment if serving over HTTPS
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3051/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Bible data fetcher ────────────────────────────────────────────────
  # Run once after first build:  docker compose run --rm bible-fetcher
  bible-fetcher:
    build: .
    container_name: scribeflow-bible-fetcher
    profiles:
      - tools
    volumes:
      - bible_data:/app/data/bibles
    environment:
      - NODE_ENV=production
    command: ["node", "scripts/fetch-bibles.js"]
    restart: "no"

  # ── Red-letter Bible fetcher ──────────────────────────────────────────
  # Downloads KJV and WEB with Words of Jesus marked (feature/red-letter branch).
  # Run once after building from this branch:
  #   docker compose run --rm bible-fetcher-rl
  bible-fetcher-rl:
    build: .
    container_name: scribeflow-bible-fetcher-rl
    profiles:
      - tools
    volumes:
      - bible_data:/app/data/bibles
    environment:
      - NODE_ENV=production
    command: ["node", "scripts/fetch-bibles-redletter.js"]
    restart: "no"

volumes:
  scribeflow_data:
    driver: local
    # Uncomment to bind to a host path (NAS / ZFS dataset):
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/your-nas/scribeflow-data

  bible_data:
    driver: local
    # Holds the Bible JSON files (~25 MB).
    # Shared between scribeflow (read) and bible-fetcher (write).
