version: '3.8'

# ── ScribeFlow Docker Compose ─────────────────────────────────────────────
#
# HOW DATA PERSISTS ACROSS UPDATES:
#   Projects are stored in a named Docker volume (scribeflow_data → /data).
#   Volumes are NOT removed when you stop, remove, or rebuild the container.
#   Only `docker compose down -v` or `docker volume rm scribeflow_data`
#   would delete your data.
#
# UPDATE WORKFLOW (safe — data survives every step):
#   docker compose down          # stop + remove container
#   docker compose build --no-cache   # rebuild image with latest code
#   docker compose up -d         # start new container — projects reload automatically
#
# BACKUP your volume before major updates:
#   docker run --rm \
#     -v scribeflow_data:/data \
#     -v $(pwd):/backup \
#     alpine tar -czf /backup/scribeflow-backup-$(date +%Y%m%d).tar.gz /data
#
# RESTORE from backup:
#   docker run --rm \
#     -v scribeflow_data:/data \
#     -v $(pwd):/backup \
#     alpine tar -xzf /backup/scribeflow-backup-YYYYMMDD.tar.gz -C /
# ─────────────────────────────────────────────────────────────────────────

services:
  scribeflow:
    build: .
    container_name: scribeflow
    restart: unless-stopped
    ports:
      - "${PORT:-3051}:3051"
    volumes:
      # Named volume — persists independently of the container lifecycle.
      # Rebuild the image as many times as you like; this volume stays.
      - scribeflow_data:/data
    environment:
      - PORT=3051
      - DATA_DIR=/data
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3051/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  scribeflow_data:
    driver: local
    # To use an explicit host path instead of a Docker-managed volume,
    # uncomment and set the path below:
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/your-nas/scribeflow-data
